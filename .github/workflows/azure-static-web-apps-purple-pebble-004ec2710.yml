name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 🧹 Limpieza pre-deploy - borrar node_modules
        run: |
          echo "========================================"
          echo "  Archivos ANTES de limpiar node_modules"
          echo "========================================"
          echo "Total de archivos en workspace:"
          find . -not -path './.git/*' | wc -l
          echo ""
          echo "Borrando node_modules..."
          rm -rf node_modules
          echo ""
          echo "========================================"
          echo "  Archivos DESPUES de limpiar node_modules"
          echo "========================================"
          echo "Total de archivos en workspace:"
          find . -not -path './.git/*' | wc -l
          echo ""
          echo "Contenido del dist/ que se va a deployar:"
          ls -lh dist/
          echo ""
          echo "Total archivos en dist/:"
          find dist/ | wc -l
          echo "========================================"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_004EC2710 }}
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_004EC2710 }}
          action: "close"